apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: to-do-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - to-do
  selector:
    matchLabels:
      app: to-do
  endpoints:
    - port: http
      path: /metrics
