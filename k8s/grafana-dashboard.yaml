apiVersion: v1
kind: ConfigMap
metadata:
  name: to-do-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  to-do-dashboard.json: |
    {
      "title": "To-Do App",
      "uid": "to-do-app",
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m])) by (route, method)",
              "legendFormat": "{{method}} {{route}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[1m]))",
              "legendFormat": "5xx errors/s"
            }
          ]
        },
        {
          "id": 3,
          "title": "P95 Request Duration",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[1m])) by (le, route))",
              "legendFormat": "p95 {{route}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Total Requests",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(http_requests_total)",
              "legendFormat": "Total"
            }
          ]
        },
        {
          "id": 5,
          "title": "Active Pods",
          "type": "stat",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "count(up{job=\"to-do-monitor\"})",
              "legendFormat": "Pods"
            }
          ]
        }
      ]
    }
