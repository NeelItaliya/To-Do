services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: to-do
    container_name: To-Do
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AWS_REGION=ap-south-1
      - USERS_TABLE=to-do-users
      - TODOS_TABLE=to-do-todos
      - JWT_SECRET=change-me-for-local-dev
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
